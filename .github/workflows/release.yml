name: Release

# Builds Windows / Linux / macOS bundles and publishes them to a GitHub Release
# whenever a version tag is pushed (e.g. `git tag v0.1.2 && git push --tags`).
#
# Stable asset filenames are used so the web app can link to
# https://github.com/<owner>/<repo>/releases/latest/download/<file>
# and pick up new versions automatically.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_label: linux
          - platform: windows-latest
            os_label: windows
          - platform: macos-latest
            os_label: macos
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        # Tauri 2 links against webkit2gtk-4.1 / libsoup-3.0, which are the
        # versions shipped on Ubuntu 24.04+. Building on 22.04 would fail
        # because those .pc files don't exist there.
        #
        # GStreamer runtime packages are installed here so that
        # linuxdeploy-plugin-gstreamer can copy them (with their dependencies)
        # into the AppImage, making audio work on any Linux distro.
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-alsa \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-tools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          # Bump this prefix to invalidate the cache (e.g. when fixing icon embedding).
          prefix-key: 'v2-cargo-icons'

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Regenerate desktop icons from master PNG
        # Tauri-build embeds the .ico into the Windows .exe and the .icns into
        # the macOS bundle as resources. Regenerating with the runner's own
        # `tauri icon` tool guarantees the formats match what `tauri-build`
        # expects on that platform, avoiding cross-platform .ico/.icns oddities
        # that lead to fallback/default icons in the title bar and taskbar.
        shell: bash
        run: |
          set -euo pipefail
          MASTER=src-tauri/icons/icon.png
          if [ ! -f "$MASTER" ]; then
            echo "::error::master icon $MASTER not found"
            exit 1
          fi
          echo "Regenerating icons from $MASTER..."
          npx tauri icon "$MASTER"
          echo '--- regenerated icons ---'
          ls -la src-tauri/icons/
          file src-tauri/icons/icon.ico src-tauri/icons/icon.icns src-tauri/icons/32x32.png src-tauri/icons/128x128.png

      - name: Rebuild icon.ico in BMP/DIB format (Windows shell compat)
        # `npx tauri icon` writes an .ico whose every sub-image is PNG-compressed.
        # Windows Explorer's shortcut/Start-Menu icon renderer cannot decode
        # PNG-encoded sub-images for the small sizes (16/24/32/48), so MSI
        # shortcuts (Start Menu, Desktop, taskbar pin) fall back to a generic
        # default icon. Re-encode with ImageMagick: BMP/DIB for the small sizes,
        # PNG only for the 256x256 slot (which is what Vista+ shell expects).
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          MASTER=src-tauri/icons/icon.png
          ICO=src-tauri/icons/icon.ico
          # ImageMagick is preinstalled on windows-latest runners.
          magick "$MASTER" -define icon:auto-resize=256,48,32,24,16 "$ICO"
          echo '--- rebuilt icon.ico ---'
          file "$ICO"

      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-keychain
        run: |
          set -euo pipefail
          # Decode base64 certificate to a temp .p12
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Strip any stray CR/LF from the password (defensive)
          P12_PASS=$(printf '%s' "$APPLE_CERTIFICATE_PASSWORD" | tr -d '\r\n')

          # Verify the .p12 + password BEFORE touching the keychain (clear error msg).
          # Try legacy first (-legacy) since that's what Apple's `security` accepts.
          if openssl pkcs12 -legacy -in "$CERT_PATH" -noout -passin "pass:$P12_PASS" 2>/dev/null; then
            echo "✓ .p12 verified (legacy PKCS12)"
          elif openssl pkcs12 -in "$CERT_PATH" -noout -passin "pass:$P12_PASS" 2>/dev/null; then
            echo "✓ .p12 verified (modern PKCS12)"
            echo "::warning::PKCS12 is in modern format; macOS 'security' may reject it. Re-export with openssl -legacy."
          else
            echo "::error::PKCS12 verification failed — APPLE_CERTIFICATE_PASSWORD does not match the .p12 file"
            exit 1
          fi

          # Create a dedicated keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Import the .p12 with the cleaned password
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASS" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to use the key without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Sanity: list signing identities
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Tauri bundles
        env:
          # Tauri reads these to sign + notarize the macOS bundle automatically.
          # Empty / unset on non-macOS jobs (no-op).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn bundle

      - name: Bundle GStreamer plugins into AppImage (Linux only)
        # Tauri's AppImage bundler ships GStreamer libraries but NOT plugins.
        # Without plugins, elements like appsink/appsrc/decodebin/autoaudiosink
        # are unavailable on any system whose host GStreamer version differs from
        # the build host (ubuntu-24.04 ≈ 1.24). This step uses
        # linuxdeploy-plugin-gstreamer to copy the runner's GStreamer plugins
        # (installed in the step above) into the AppImage, making audio work on
        # any Linux distro regardless of the installed GStreamer version.
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail

          # ── 1. Download tools ──────────────────────────────────────────────
          mkdir -p /tmp/linuxdeploy-tools
          wget -q -O /tmp/linuxdeploy-tools/linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x /tmp/linuxdeploy-tools/linuxdeploy-x86_64.AppImage

          # The plugin script must be on PATH so linuxdeploy can call it.
          # Pinned to the continuous release asset (not master branch) to reduce
          # supply-chain risk while still tracking upstream plugin fixes.
          wget -q -O /tmp/linuxdeploy-tools/linuxdeploy-plugin-gstreamer.sh \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-gstreamer/releases/download/continuous/linuxdeploy-plugin-gstreamer.sh"
          chmod +x /tmp/linuxdeploy-tools/linuxdeploy-plugin-gstreamer.sh

          export PATH="/tmp/linuxdeploy-tools:$PATH"

          # ── 2. Locate and extract the Tauri-built AppImage ─────────────────
          APPIMAGE_DIR="src-tauri/target/release/bundle/appimage"
          ORIG_APPIMAGE="$(ls "$APPIMAGE_DIR"/*.AppImage | head -1)"
          echo "Found AppImage: $ORIG_APPIMAGE"

          # --appimage-extract uses built-in squashfs (no FUSE required)
          "$ORIG_APPIMAGE" --appimage-extract
          # Creates ./squashfs-root/ in the current working directory

          # ── 3. Inject GStreamer plugins into the extracted AppDir ──────────
          # APPIMAGE_EXTRACT_AND_RUN=1 avoids the FUSE requirement for linuxdeploy.
          # The plugin copies all GStreamer plugins + their library deps from the
          # runner system into squashfs-root/usr/lib/gstreamer-1.0/ and updates
          # AppRun to set GST_PLUGIN_PATH / GST_PLUGIN_SYSTEM_PATH at launch.
          APPIMAGE_EXTRACT_AND_RUN=1 \
            linuxdeploy-x86_64.AppImage \
            --appdir squashfs-root \
            --plugin gstreamer

          # ── 4. Verify essential plugins were actually injected (fail fast) ───
          echo "--- GStreamer plugins bundled in AppImage ---"
          PLUGIN_DIR="squashfs-root/usr/lib/gstreamer-1.0"
          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "::error::$PLUGIN_DIR directory not found — GStreamer plugin bundling failed!"
            exit 1
          fi

          # Check that the specific elements the app requires are present.
          # libgstapp.so     → appsink, appsrc
          # libgstplayback.so → decodebin
          # libgstautodetect.so → autoaudiosink
          REQUIRED_PLUGINS=(libgstapp.so libgstplayback.so libgstautodetect.so)
          for plugin in "${REQUIRED_PLUGINS[@]}"; do
            if [ ! -f "$PLUGIN_DIR/$plugin" ]; then
              echo "::error::Required GStreamer plugin $plugin NOT found in $PLUGIN_DIR — bundling failed!"
              exit 1
            fi
            echo "  ✔ $plugin"
          done
          echo "Total plugins bundled: $(ls "$PLUGIN_DIR"/*.so 2>/dev/null | wc -l)"

          # ── 5. Repack the AppImage ─────────────────────────────────────────
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            linuxdeploy-x86_64.AppImage \
            --appdir squashfs-root \
            -o appimage

          # linuxdeploy writes the new AppImage to the current directory;
          # its name comes from the .desktop file inside the AppDir.
          NEW_APPIMAGE="$(ls ./*.AppImage 2>/dev/null | grep -v '^./linuxdeploy' | head -1)"
          if [ -z "$NEW_APPIMAGE" ]; then
            echo "::error::linuxdeploy did not produce an output AppImage!"
            exit 1
          fi
          echo "Repacked AppImage: $NEW_APPIMAGE ($(du -sh "$NEW_APPIMAGE" | cut -f1))"

          # Overwrite the original so the staging step picks it up unchanged.
          mv "$NEW_APPIMAGE" "$ORIG_APPIMAGE"
          echo "✔ AppImage updated with GStreamer plugins: $(du -sh "$ORIG_APPIMAGE" | cut -f1)"

      - name: Stage artifacts with stable names
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          BUNDLE=src-tauri/target/release/bundle

          # Linux — ship the AppImage (now with bundled GStreamer plugins so it
          # works on any recent x86_64 Linux distro) and the .deb for
          # apt-managed installs on Ubuntu/Debian-based systems.
          if [ -d "$BUNDLE/appimage" ]; then
            cp "$BUNDLE"/appimage/*.AppImage staging/Clickomator-linux-x86_64.AppImage
          fi
          if [ -d "$BUNDLE/deb" ]; then
            cp "$BUNDLE"/deb/*.deb staging/Clickomator-linux-amd64.deb
          fi

          # Windows
          if [ -d "$BUNDLE/msi" ]; then
            cp "$BUNDLE"/msi/*.msi           staging/Clickomator-windows-x64.msi
          fi

          # macOS
          if [ -d "$BUNDLE/dmg" ]; then
            cp "$BUNDLE"/dmg/*.dmg           staging/Clickomator-macos.dmg
          fi

          ls -la staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os_label }}
          path: staging/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-bundles

      - name: Flatten into single release directory
        run: |
          mkdir -p release
          find dist-bundles -type f \( \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.dmg' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Installation

            **Windows** — download the `.msi` and run it.

            **Linux (Ubuntu / Debian and derivatives)** — the easiest path:
            ```
            sudo apt install ./Clickomator-linux-amd64.deb
            ```
            `apt` will pull in GStreamer and all other dependencies automatically.

            **Linux (other distros / universal)** — download the `.AppImage`:
            ```
            chmod +x Clickomator-linux-x86_64.AppImage
            ./Clickomator-linux-x86_64.AppImage
            ```
            The AppImage bundles GStreamer plugins so audio works out-of-the-box
            on any x86_64 Linux distro, regardless of the system GStreamer version.

            **macOS** — download the `.dmg`, drag to Applications. The first launch may show a Gatekeeper warning because the app is not signed: right-click the app → **Open** → confirm. Subsequent launches work normally.

            ---
            *Press `Esc` in the app to toggle fullscreen / windowed mode.*
